# Deployed as a Cloudflare Worker serving static assets (not the classic
# separate "Pages" product) — this project is git-connected directly in the
# Cloudflare dashboard (Workers & Pages > todolist > Settings > Build), which
# builds and runs `npx wrangler deploy` on every push automatically. `name`
# must match the project name shown there exactly.
name = "todolist"
compatibility_date = "2026-01-01"

[assets]
directory = "dist"
# React Router uses client-side routing, so unknown paths (e.g. /calendar on
# a hard refresh) must fall back to index.html instead of 404ing.
not_found_handling = "single-page-application"
