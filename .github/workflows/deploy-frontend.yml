name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "To do list/app/frontend/**"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: To do list/app/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: To do list/app/frontend/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          # Set this repo variable (Settings > Secrets and variables > Actions
          # > Variables) once the backend is deployed, e.g. to a Cloud Run URL.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      # Requires two GitHub Actions secrets, both from the Cloudflare dashboard:
      #   CLOUDFLARE_API_TOKEN   - a token with "Cloudflare Pages: Edit" permission
      #   CLOUDFLARE_ACCOUNT_ID  - found on the right sidebar of any zone overview
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: aurora-tasks
          directory: To do list/app/frontend/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
